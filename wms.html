<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
    <script src=leaflet/leaflet.js></script>
    <link href="leaflet/leaflet.css" rel="stylesheet" type="text/css"/>

    <script  type="text/javascript" src="leaflet/mesure/src/Leaflet.LinearMeasurement.js"></script>
    <link rel="stylesheet" href="leaflet/mesure/src/Leaflet.LinearMeasurement.css">

    <script type="text/javascript" src="leaflet/Layers/src/styledLayerControl.js"></script>
    <link rel="stylesheet" href="leaflet/Layers/css/styledLayerControl.css">

    <script src="js/jquery.js"></script>  
</head>
<style>
     #ma_carte {
            width: 100%;
            height: 100vh;
        }
</style>
<body>
    <div id="ma_carte"></div>
    <script>

    //l'url serveur wms

         var url_geo_serveur="http://localhost:8080";
         var fond  = L.tileLayer.wms(url_geo_serveur+"/geoserver/wms", {
            layers:'uidt_thies:Fond de carte SENEGAL',
            format:'image/png',
            transparent:true,
            visible:true,
            isBaseLayer:true
        });
        
fond.addTo(ma_carte)
        var sante = new L.featureGroup();
        sante.addTo(ma_carte)
    </script>
</body>
</html>
